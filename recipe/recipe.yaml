schema_version: 1

context:
  version: "2.1.11"

package:
  name: ncview
  version: ${{ version }}

source:
  # url: ftp://cirrus.ucsd.edu/pub/ncview/ncview-${{ version }}.tar.gz
  # UCSD ftp server is down, so we use MIT mirror instead
  url: https://mirrors.mit.edu/macports/distfiles/ncview/ncview-${{ version }}.tar.gz
  sha256: 597cfddf9c2d7993e9b0b86bca1b73839567ee9116ee33f6d750a449b5033d91
  patches:
    - 0001-remove-same-compiler-test.patch
    - 0002-remove-explicit-expat-linking.patch
    - 0003-fix-xaw-list-pointer-types.patch

build:
  number: 14
  skip: win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - make
    - pkg-config
  host:
    - libnetcdf
    - libpng
    - udunits2
    - if: not osx
      then: xorg-libsm
    - if: not osx
      then: xorg-libice
    - xorg-libxaw
    - xorg-libxt
    - xorg-libxmu
    - xorg-xorgproto
    - xorg-libx11
  run:
    - xorg-libxaw

tests:
  - script:
      - test -f $PREFIX/bin/ncview
      - test -x $PREFIX/bin/ncview
      - "ncview -h > ncview.log 2>&1 || test $? -eq 1"
      - "grep -F \"Ncview \" ncview.log"

about:
  license: GPL-3.0-only
  license_file: COPYING
  summary: Visual browser for netCDF format files
  description: |
    Ncview is a visual browser for netCDF format files. Typically you
    would use ncview to get a quick and easy, push-button look at your
    netCDF files. You can view simple movies of the data, view along
    various dimensions, take a look at the actual data values, change
    color maps, invert the data, etc.


  homepage: http://meteora.ucsd.edu/~pierce/ncview_home_page.html

extra:
  recipe-maintainers:
    - zklaus
    - ocefpaf
    - xylar
